services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: wombat
      POSTGRES_PASSWORD: wombat
      POSTGRES_DB: wombat
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wombat"]
      interval: 5s
      timeout: 5s
      retries: 5

  detector-placeholder:
    build: ./services/detector-placeholder
    ports:
      - "8100:8100"

  detector-speciesnet:
    build: ./services/detector-speciesnet
    ports:
      - "8101:8101"
    volumes:
      - speciesnet_cache:/app/.cache/huggingface

  detector-megadetector:
    build: ./services/detector-megadetector
    ports:
      - "8102:8102"
    volumes:
      - megadetector_models:/models/megadetector
    environment:
      SPECIESNET_URL: http://detector-speciesnet:8101

  detector-awc135:
    build: ./services/detector-awc135
    ports:
      - "8103:8103"
    volumes:
      - awc135_models:/models/awc135
    environment:
      MEGADETECTOR_URL: http://detector-megadetector:8102

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://wombat:wombat@db:5432/wombat
      MEDIA_DIR: /app/media
      ACTIVE_DETECTOR: speciesnet
      MEGADETECTOR_URL: http://detector-megadetector:8102
    volumes:
      - media_data:/app/media
      - ./backend:/app
    ports:
      - "8001:8000"
    depends_on:
      db:
        condition: service_healthy
      detector-placeholder:
        condition: service_started
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build: ./frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  db_data:
  media_data:
  speciesnet_cache:
  megadetector_models:
  awc135_models:
